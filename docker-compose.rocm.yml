# ROCm override — no longer needed for production deploys.
# The main docker-compose.prod.yml already includes ROCm config.
# This file is kept for local dev use only:
#   docker compose -f docker-compose.yml -f docker-compose.rocm.yml up worker
services:
  worker:
    image: localhost:3007/akitaonrails/frank-yomik-worker-rocm:latest
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - "485"
      - "488"
    security_opt:
      - seccomp:unconfined
      - label:disable
    environment:
      HSA_OVERRIDE_GFX_VERSION: "11.5.1"
      PYTORCH_ROCM_ARCH: "gfx1151"
