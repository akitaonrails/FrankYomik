services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 60s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  ollama-pull:
    image: ollama/ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "qwen3:14b"]
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  # One-shot container that fixes shared-cache volume ownership before
  # the API or worker start.  Needed because distroless (API) has no chown.
  init-perms:
    image: busybox
    volumes:
      - shared-cache:/data/cache
    command: ["sh", "-c", "chown -R 65532:65532 /data/cache"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      REDIS_URL: redis://redis:6379
      AUTH_TOKEN: ${AUTH_TOKEN:?Set AUTH_TOKEN in .env or environment}
      CACHE_DIR: /data/cache
    volumes:
      - shared-cache:/data/cache
    depends_on:
      redis:
        condition: service_healthy
      init-perms:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    command: ["--pipeline", "both", "--redis-url", "redis://redis:6379"]
    volumes:
      - shared-cache:/app/cache
      - mangaocr-cache:/home/worker/.cache/manga_ocr
      - huggingface-cache:/home/worker/.cache/huggingface
      - easyocr-cache:/home/worker/.EasyOCR
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
      init-perms:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  redis-data:
  ollama-models:
  shared-cache:
  mangaocr-cache:
  huggingface-cache:
  easyocr-cache:
