# Translation Model Comparison (A/B tested on 17 manga dialogue samples)
#
# Model              | VRAM  | Speed      | Speedup | Quality Notes
# -------------------|-------|------------|---------|-------------------------------------------
# qwen3:14b          |  9 GB | 0.2s/text  |   18x   | Best balance. Captures casual tone and
#                    |       |            |         | nuance well ("I messed up!", "Damn it!").
#                    |       |            |         | Good on complex dialogue. Minor SFX
#                    |       |            |         | weakness (unusual romanizations). No
#                    |       |            |         | critical failures. Requires think: false
#                    |       |            |         | and /api/chat endpoint.
#                    |       |            |         |
# translategemma:12b |  8 GB | 0.3s/text  |   11x   | Most polished/consistent output. Strong
#                    |       |            |         | formal vocabulary ("confine" vs "encircle").
#                    |       |            |         | Weakness: flattens vulgar/casual tone
#                    |       |            |         | (テメェ→"You did that?!" loses aggression,
#                    |       |            |         | やっちまったなぁ→"Oh no!" loses "screwed up").
#                    |       |            |         | No think param needed.
#                    |       |            |         |
# qwen3:8b           |  5 GB | 0.1s/text  |   30x   | Fastest, smallest. Great casual tone.
#                    |       |            |         | CRITICAL FLAW: leaks raw Japanese chars
#                    |       |            |         | in output (e.g. "Ado妃" for 阿多妃).
#                    |       |            |         | Bad SFX ("kiss" for くっ). Not recommended.
#                    |       |            |         |
# qwen3:30b-instruct | 18 GB | 0.1s/text  |   22x   | Fast but heavy (nearly as much VRAM as
#                    |       |            |         | the 32b model). Quality similar to 14b.
#                    |       |            |         | Not worth the VRAM cost over 14b.
#                    |       |            |         |
# qwen2.5vl:32b      | 21 GB | 2.9s/text  |    1x   | Previous default. Vision model used for
#                    |       |            |         | text-only task (wasteful). Acceptable
#                    |       |            |         | quality but misses casual nuance.
#                    |       |            |         | Keep only as fallback. No think param.

ollama:
  url: "http://localhost:11434"
  translate_model: "qwen3:14b"
  translate_options:
    temperature: 0.3
    num_predict: 1024
    think: false
  # translate_model: "translategemma:12b"   # polished but flattens casual tone
  # translate_model: "qwen2.5vl:32b"       # previous default, 21GB, no think param needed

fonts:
  # Japanese: GenEi Antique v5 — true manga antique gothic (SIL OFL)
  #   P = proportional kana (standard dialogue), N = monospace kana
  jp: "fonts/genei_antique/GenEiAntiquePv5-M.ttf"
  jp_bold: "fonts/genei_antique/GenEiAntiquePv5-M.ttf"
  # Alternatives:
  # jp: "fonts/shippori_antique/ShipporiAntique-Regular.ttf"       # Shippori Antique (SIL OFL)
  # jp: "fonts/shippori_antique/ShipporiAntiqueB1-Regular.ttf"     # Shippori Antique B1 (ink-pooling)
  # jp: "/usr/share/fonts/noto-cjk/NotoSansCJK-Regular.ttc"       # Noto Sans CJK (system)
  # jp_bold: "/usr/share/fonts/noto-cjk/NotoSansCJK-Bold.ttc"
  en: "fonts/KomikaText-Regular.ttf"
  en_bold: "fonts/KomikaText-Bold.ttf"
  sfx: "fonts/BadaBoomBB.ttf"
  # Alternatives:
  # en: "fonts/ComicNeue-Regular.otf"
  # en_bold: "fonts/ComicNeue-Bold.otf"

ocr:
  device: "cuda"   # "cuda" for GPU (~350MB); "cpu" if VRAM is tight

text_detection:
  enabled: true           # EasyOCR Japanese text detection for artwork text
  confidence: 0.3         # EasyOCR confidence threshold
  gpu: true

manga_inpainting:
  enabled: false          # Off by default
  pad: 20                 # Padding around text region for inpainting

webtoon:
  data_dir: "webtoon_data"          # Downloaded images root
  output_dir: "output/webtoon"      # Translated output
  scraper:
    scroll_pause: 0.5               # Seconds between scrolls
    download_timeout: 30             # Per-image download timeout
  easyocr:
    gpu: true
    confidence_threshold: 0.25      # Minimum OCR confidence
    text_threshold: 0.5             # EasyOCR text detection threshold (lower = more detections)
    low_text: 0.3                   # EasyOCR low text score (lower = more text linking)
    inverted_confidence: 0.10       # Lower threshold for inverted pass (bright text on dark bg)
  bubble_detection:
    cluster_gap: 40                 # Max vertical gap between text lines in same bubble
    pad_x: 15                       # Horizontal padding around text cluster
    pad_y: 10                       # Vertical padding around text cluster
    flood_fill_tolerance: 15        # LAB color space tolerance for flood fill
    contour_expand: 5               # Pixels to expand contour search area
  inpainting:
    enabled: true                    # Opt-in; existing pipeline unchanged by default
    model: "lama"                     # "lama", "flux-fill", or "sdxl"
    erode_px: 3                       # Shrink mask from bubble edge to preserve outline
    text_pad: 24                      # Padding around text detections in mask
    text_dilate: 6                    # Dilate text rects to catch glyph antialiasing
    context_pad: 20                   # Extra pixels around bubble crop for model context
    # Diffusion-specific (ignored for LaMa):
    num_inference_steps: 28
    prompt: "clean empty speech bubble interior, flat color"

worker:
  redis_url: "redis://localhost:6379"
  consumer_group: "workers"
  heartbeat_interval: 30
  job_timeout: 300
  cache_dir: "./cache"
  result_ttl: 3600          # Redis result expiry (seconds)
  heartbeat_ttl: 60         # Redis heartbeat key expiry (seconds)
  progress_ttl: 60          # Redis progress key expiry (seconds)
  high_burst_before_low: 3  # Max consecutive high-priority jobs before probing low
